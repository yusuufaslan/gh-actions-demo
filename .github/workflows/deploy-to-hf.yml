name: Deploy to HuggingFace Spaces

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "requirements.txt"
      - "Dockerfile"
  workflow_dispatch:

env:
  HF_SPACE_ID: "yusuf-aslan/text-tools"
  HF_USERNAME: "yusuf-aslan"
  HF_SPACE_NAME: "text-tools"
  HF_TOKEN: ${{ secrets.HF_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Space if Not Exists
        run: python - <<'PYEOF'
          from huggingface_hub import HfApi
          api = HfApi()
          try:
              api.create_repo(
                  repo_id="yusuf-aslan/text-tools",
                  repo_type="space",
                  space_sdk="gradio",
                  exist_ok=True
              )
              print("Space mevcut veya olusturuldu.")
          except Exception as e:
              if "already exists" in str(e):
                  print("Space zaten mevcut.")
              else:
                  raise
PYEOF

      - name: Upload Files to Space
        run: python - <<'PYEOF'
          from huggingface_hub import HfApi
          api = HfApi()
          api.upload_folder(
              folder_path=".",
              repo_id="yusuf-aslan/text-tools",
              repo_type="space",
              include=["src/app.py", "requirements.txt", "Dockerfile"],
              ignore_patterns=[
                  ".github/**",
                  ".git/**",
                  "*.md",
                  "docs/**",
                  "__pycache__/**",
                  ".kilo/**",
                  ".vscode/**",
              ]
          )
          print("Dosyalar Space yuklendi.")
PYEOF

      - name: Verify Deployment
        run: |
          echo "Deploy tamamlandi!"
          echo "Space adresi: https://huggingface.co/spaces/yusuf-aslan/text-tools"
