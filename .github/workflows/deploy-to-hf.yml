name: Deploy to HuggingFace Spaces

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "requirements.txt"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/deploy-hf-space.yml
    with:
      space-id: "yusuf-aslan/text-tools"
    secrets:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
